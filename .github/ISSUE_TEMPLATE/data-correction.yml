name: Data correction or addition
description: A fact is missing, wrong, or needs a source — for characters, media, locations, teasers, or minigames.
labels: ["data"]
body:
  - type: markdown
    attributes:
      value: |
        No need to know Git for this — a clear description is a full contribution on its own.
  - type: dropdown
    id: resource
    attributes:
      label: Resource type
      options:
        - Character
        - Media (game/book/movie)
        - Location
        - Teaser
        - Minigame
        - Other / not sure
    validations:
      required: true
  - type: input
    id: entry
    attributes:
      label: Which entry?
      description: Name or id (e.g. "Springtrap" or "springtrap"). Leave blank if this is a brand-new entry.
      placeholder: springtrap
  - type: textarea
    id: problem
    attributes:
      label: What's wrong or missing?
      description: Be specific — a field name if you know it, otherwise just describe it.
      placeholder: "debut is listed as fnaf-3 but should be fnaf-2, since he's a Bonnie variant referenced in that game's minigames"
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source
      description: Where does this come from? A game, an official statement, a specific wiki page, a timestamp in a video.
      placeholder: "Five Nights at Freddy's 3, Night 3 minigame dialogue"
    validations:
      required: true
  - type: dropdown
    id: canonicity
    attributes:
      label: If this is lore (not a plain fact) — how certain is it?
      description: Skip this for non-lore facts like dates or credits.
      options:
        - Not applicable
        - Confirmed (stated directly, unambiguous)
        - Implied (strongly suggested but not stated outright)
        - Theory (a popular fan reading, not confirmed)
